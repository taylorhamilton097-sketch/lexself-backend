<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClearStand — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #0D1B2A;
  --navy-mid: #162233;
  --navy-light: #1E3045;
  --blue: #2E86C1;
  --blue-light: #3EA4E4;
  --border: #2A3F56;
  --text: #E8EDF2;
  --text2: #8BA3BA;
  --text3: #4A6680;
  --white: #F4F6F8;
  --red: #E87070;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { min-height: 100%; }
body {
  background: var(--navy);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

/* ── NAV ── */
nav {
  background: var(--navy-mid);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.nav-logo {
  font-family: 'Playfair Display', serif;
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--white);
  text-decoration: none;
}
.nav-logo span { color: var(--blue-light); }
.nav-back {
  font-family: 'JetBrains Mono', monospace;
  font-size: .55rem;
  text-transform: uppercase;
  letter-spacing: .12em;
  color: var(--text3);
  text-decoration: none;
  transition: color .15s;
}
.nav-back:hover { color: var(--text2); }

/* ── MAIN ── */
main {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px 24px 60px;
}

/* ── AUTH BOX ── */
.auth-wrap { width: 100%; max-width: 440px; }

.auth-box {
  background: var(--navy-mid);
  border: 1px solid var(--border);
  padding: 36px 32px 28px;
}

.auth-logo {
  font-family: 'Playfair Display', serif;
  font-size: 1.5rem;
  font-weight: 700;
  color: var(--white);
  text-align: center;
  margin-bottom: 4px;
}
.auth-logo span { color: var(--blue-light); }

.auth-subtitle {
  font-family: 'JetBrains Mono', monospace;
  font-size: .5rem;
  text-transform: uppercase;
  letter-spacing: .14em;
  color: var(--text3);
  text-align: center;
  margin-bottom: 24px;
  line-height: 1.6;
}

/* ── TABS ── */
.auth-tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
  margin-bottom: 24px;
}
.auth-tab {
  flex: 1;
  padding: 10px;
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  cursor: pointer;
  font-family: 'JetBrains Mono', monospace;
  font-size: .58rem;
  text-transform: uppercase;
  letter-spacing: .12em;
  color: var(--text3);
  transition: all .15s;
  min-height: 42px;
}
.auth-tab.active {
  color: var(--blue-light);
  border-bottom-color: var(--blue);
}

/* ── FORM FIELDS ── */
.field-group { margin-bottom: 14px; }
.field-lbl {
  font-family: 'JetBrains Mono', monospace;
  font-size: .52rem;
  text-transform: uppercase;
  letter-spacing: .12em;
  color: var(--text3);
  display: block;
  margin-bottom: 5px;
}
.field-inp {
  width: 100%;
  background: var(--navy);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 12px 14px;
  font-family: 'Inter', sans-serif;
  font-size: 1rem;
  outline: none;
  transition: border-color .15s;
  -webkit-appearance: none;
  border-radius: 0;
}
.field-inp:focus { border-color: var(--blue); }

/* ── TERMS ── */
.terms-row {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  margin-bottom: 16px;
}
.terms-row input[type="checkbox"] {
  width: 16px;
  height: 16px;
  margin-top: 2px;
  flex-shrink: 0;
  cursor: pointer;
  accent-color: var(--blue);
}
.terms-row label {
  font-family: 'Inter', sans-serif;
  font-size: .82rem;
  color: var(--text3);
  line-height: 1.55;
  cursor: pointer;
}
.terms-row a { color: var(--blue-light); text-decoration: underline; }

/* ── BUTTON ── */
.auth-btn {
  width: 100%;
  padding: 14px;
  background: var(--blue);
  color: var(--white);
  border: none;
  cursor: pointer;
  font-family: 'JetBrains Mono', monospace;
  font-size: .68rem;
  text-transform: uppercase;
  letter-spacing: .15em;
  font-weight: 600;
  min-height: 50px;
  transition: background .15s;
  margin-bottom: 4px;
}
.auth-btn:hover { background: var(--blue-light); }
.auth-btn:disabled { opacity: .55; cursor: not-allowed; }

/* ── ERROR ── */
.auth-err {
  font-family: 'Inter', sans-serif;
  font-size: .85rem;
  color: var(--red);
  padding: 10px 12px;
  background: rgba(232,112,112,.08);
  border: 1px solid rgba(232,112,112,.2);
  margin-bottom: 14px;
  display: none;
  line-height: 1.5;
}
.auth-err.show { display: block; }
.auth-err a { color: var(--red); font-weight: 600; cursor: pointer; text-decoration: underline; }

/* ── NOTE ── */
.auth-note {
  font-family: 'JetBrains Mono', monospace;
  font-size: .47rem;
  text-transform: uppercase;
  letter-spacing: .1em;
  color: var(--text3);
  text-align: center;
  margin-top: 12px;
  line-height: 1.8;
}

/* ── BACK LINK ── */
.back-home {
  display: block;
  text-align: center;
  margin-top: 16px;
  font-family: 'Inter', sans-serif;
  font-size: .85rem;
  color: var(--text3);
  text-decoration: none;
}
.back-home:hover { color: var(--text2); }

@media (max-width: 480px) {
  .auth-box { padding: 28px 20px 20px; }
}
</style>
</head>
<body>

<nav>
  <a href="/" class="nav-logo">Clear<span>Stand</span></a>
  <a href="/" class="nav-back">← Back to Home</a>
</nav>

<main>
  <div class="auth-wrap">
    <div class="auth-box">

      <!-- LOGO + SUBTITLE -->
      <div class="auth-logo" id="authLogo">Clear<span>Stand</span></div>
      <div class="auth-subtitle" id="authSubtitle">Your rights. Your case. Your ground.</div>

      <!-- TABS — always visible, always both -->
      <div class="auth-tabs">
        <button class="auth-tab" id="tabSignin" onclick="showTab('signin')">Sign In</button>
        <button class="auth-tab active" id="tabRegister" onclick="showTab('register')">Create Account</button>
      </div>

      <!-- ── SIGN IN FORM ── -->
      <div id="formSignin" style="display:none">
        <div class="auth-err" id="signinErr"></div>
        <div class="field-group">
          <label class="field-lbl" for="siEmail">Email</label>
          <input class="field-inp" type="email" id="siEmail" placeholder="you@email.com" autocomplete="email">
        </div>
        <div class="field-group">
          <label class="field-lbl" for="siPass">Password</label>
          <input class="field-inp" type="password" id="siPass" placeholder="••••••••" autocomplete="current-password"
            onkeydown="if(event.key==='Enter')submitSignin()">
        </div>
        <button class="auth-btn" id="signinBtn" onclick="submitSignin()">Sign In</button>
      </div>

      <!-- ── REGISTER FORM ── -->
      <div id="formRegister">
        <div class="auth-err" id="registerErr"></div>
        <div class="field-group">
          <label class="field-lbl" for="regName">Full Name</label>
          <input class="field-inp" type="text" id="regName" placeholder="Your full name" autocomplete="name">
        </div>
        <div class="field-group">
          <label class="field-lbl" for="regEmail">Email Address</label>
          <input class="field-inp" type="email" id="regEmail" placeholder="you@email.com" autocomplete="email">
        </div>
        <div class="field-group">
          <label class="field-lbl" for="regPass">Password</label>
          <input class="field-inp" type="password" id="regPass" placeholder="Min. 8 characters" autocomplete="new-password"
            onkeydown="if(event.key==='Enter')submitRegister()">
        </div>
        <div class="terms-row">
          <input type="checkbox" id="regTerms">
          <label for="regTerms">I have read and agree to the
            <a href="/terms-of-use" target="_blank">Terms of Use</a> and
            <a href="/privacy-policy" target="_blank">Privacy Policy</a>
          </label>
        </div>
        <button class="auth-btn" id="registerBtn" onclick="submitRegister()">Create Account</button>
        <div class="auth-note" id="registerNote">Free to start · No credit card required · Not legal advice</div>
      </div>

    </div>
    <a href="/" class="back-home">← Back to ClearStand Home</a>
  </div>
</main>

<!-- PLAN SELECTION STEP (shown after registration) -->
<div id="planStep" style="display:none;width:100%;padding:40px 24px 60px;max-width:960px;margin:0 auto">
  <div style="text-align:center;margin-bottom:8px">
    <div style="font-family:'Playfair Display',serif;font-size:clamp(1.5rem,3vw,2rem);color:var(--white)">Start free or choose a plan.</div>
    <div style="font-family:'Inter',sans-serif;font-size:.9rem;color:var(--text3);margin-top:8px">You can upgrade any time from inside your account.</div>
  </div>

  <!-- Monthly / Annual toggle -->
  <div style="display:flex;align-items:center;justify-content:center;gap:12px;margin:24px 0 32px">
    <span id="lblMonthly" style="font-family:'JetBrains Mono',monospace;font-size:.55rem;text-transform:uppercase;letter-spacing:.12em;color:var(--blue-light)">Monthly</span>
    <label style="position:relative;width:44px;height:24px;cursor:pointer">
      <input type="checkbox" id="annualToggle" onchange="setAnnual(this.checked)" style="opacity:0;width:0;height:0">
      <span id="toggleSlider" style="position:absolute;inset:0;background:var(--border);border-radius:24px;transition:.3s"></span>
      <span id="toggleKnob" style="position:absolute;width:18px;height:18px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.3s"></span>
    </label>
    <span id="lblAnnual" style="font-family:'JetBrains Mono',monospace;font-size:.55rem;text-transform:uppercase;letter-spacing:.12em;color:var(--text3)">Annual</span>
    <span id="saveBadge" style="display:none;font-family:'JetBrains Mono',monospace;font-size:.48rem;text-transform:uppercase;letter-spacing:.1em;color:#4CAF50;background:rgba(76,175,80,.12);border:1px solid rgba(76,175,80,.3);padding:2px 8px;border-radius:20px">Save up to $509/yr</span>
  </div>

  <div id="planGrid" style="display:grid;gap:10px;margin-bottom:24px"></div>

  <div style="text-align:center">
    <a href="/" style="font-family:'Inter',sans-serif;font-size:.85rem;color:var(--text3);text-decoration:none">← Back to ClearStand</a>
  </div>
</div>

<script>
// ─────────────────────────────────────────
// CONFIGURATION
// ─────────────────────────────────────────
const params  = new URLSearchParams(window.location.search);
const product = params.get('product') || '';   // 'family' | 'criminal' | 'clearsplit' | ''

const PRODUCT_CONFIG = {
  family: {
    logo:     'Clear<span>Stand</span>',
    subtitle: 'Ontario Family Law',
    regBtn:   'Create Free Account',
    note:     'Free to start · No credit card required · Not legal advice',
    dest:     '/family',
  },
  criminal: {
    logo:     'Clear<span>Stand</span>',
    subtitle: 'Canadian Criminal Defence',
    regBtn:   'Create Free Account',
    note:     'Free to start · No credit card required · Not legal advice',
    dest:     '/criminal-app',
  },
  clearsplit: {
    logo:     'Clear<span>Split</span>',
    subtitle: 'Separation Agreement · Create your account to continue to payment',
    regBtn:   'Create Account & Continue →',
    note:     'One-time payment of $299 after account creation',
    dest:     null, // goes to Stripe checkout
  },
  '': {
    logo:     'Clear<span>Stand</span>',
    subtitle: 'Your rights. Your case. Your ground.',
    regBtn:   'Create Account',
    note:     'Free to start · No credit card required · Not legal advice',
    dest:     null, // show product selection
  },
};

const cfg = PRODUCT_CONFIG[product] || PRODUCT_CONFIG[''];

// Apply config to UI
document.getElementById('authLogo').innerHTML      = cfg.logo;
document.getElementById('authSubtitle').textContent = cfg.subtitle;
document.getElementById('registerBtn').textContent  = cfg.regBtn;
document.getElementById('registerNote').textContent = cfg.note;

// ─────────────────────────────────────────
// TAB SWITCHING
// ─────────────────────────────────────────
function showTab(tab) {
  const isSignin = (tab === 'signin');
  document.getElementById('tabSignin').classList.toggle('active', isSignin);
  document.getElementById('tabRegister').classList.toggle('active', !isSignin);
  document.getElementById('formSignin').style.display   = isSignin ? 'block' : 'none';
  document.getElementById('formRegister').style.display = isSignin ? 'none'  : 'block';
}

// Default: show register tab (or signin if ?signin=1)
if (params.get('signin') === '1') {
  showTab('signin');
} else {
  showTab('register');
}

// ─────────────────────────────────────────
// AUTH SUCCESS — single handler for both
// login and registration
// ─────────────────────────────────────────
async function onAuthSuccess(token, user, fromRegistration = false) {
  localStorage.setItem('ls_tok', token);

  if (product === 'clearsplit') {
    await goClearSplitCheckout(token);
    return;
  }

  // After registration for subscription products — show plan selection
  if (fromRegistration && (product === 'family' || product === 'criminal' || product === 'both' || product === '')) {
    // Store which product for plan grid
    selectedProduct = product || user.products || 'criminal';
    buildPlanGrid();
    showStep(3);
    return;
  }

  // Login or direct routing — go straight to app
  routeToApp(user);
}

function routeToApp(user) {
  const p = user?.products || selectedProduct || 'criminal';
  if (p === 'family') window.location.href = '/family';
  else if (p === 'both') window.location.href = '/criminal-app';
  else window.location.href = '/criminal-app';
}

// ─────────────────────────────────────────
// CLEARSPLIT CHECKOUT
// ─────────────────────────────────────────
async function goClearSplitCheckout(token) {
  try {
    const r = await fetch('/api/billing/clearsplit/checkout', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
      body: JSON.stringify({ action: 'new' }),
    });
    const d = await r.json();
    if (d.url) {
      window.location.href = d.url;
    } else {
      alert('Unable to start checkout: ' + (d.error || 'Unknown error. Please try again or contact support@clearstand.ca'));
    }
  } catch(e) {
    alert('Connection error. Please try again.');
  }
}

// ─────────────────────────────────────────
// SIGN IN
// ─────────────────────────────────────────
async function submitSignin() {
  const email = document.getElementById('siEmail').value.trim();
  const pass  = document.getElementById('siPass').value;
  const err   = document.getElementById('signinErr');
  const btn   = document.getElementById('signinBtn');

  err.classList.remove('show');

  if (!email || !pass) {
    err.textContent = 'Email and password required.';
    err.classList.add('show');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Signing in…';

  try {
    const r = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password: pass }),
    });
    const d = await r.json();

    if (!r.ok || d.error) {
      err.textContent = 'Invalid email or password. Please try again.';
      err.classList.add('show');
    } else {
      await onAuthSuccess(d.token, d.user, false);
    }
  } catch(e) {
    err.textContent = 'Connection error. Please try again.';
    err.classList.add('show');
  }

  btn.disabled = false;
  btn.textContent = 'Sign In';
}

// ─────────────────────────────────────────
// REGISTER
// ─────────────────────────────────────────
async function submitRegister() {
  const name  = document.getElementById('regName').value.trim();
  const email = document.getElementById('regEmail').value.trim();
  const pass  = document.getElementById('regPass').value;
  const terms = document.getElementById('regTerms').checked;
  const err   = document.getElementById('registerErr');
  const btn   = document.getElementById('registerBtn');

  err.classList.remove('show');

  if (!name) {
    err.textContent = 'Please enter your full name.';
    err.classList.add('show'); return;
  }
  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    err.textContent = 'Please enter a valid email address.';
    err.classList.add('show'); return;
  }
  if (pass.length < 8) {
    err.textContent = 'Password must be at least 8 characters.';
    err.classList.add('show'); return;
  }
  if (!terms) {
    err.textContent = 'Please agree to the Terms of Use and Privacy Policy to continue.';
    err.classList.add('show'); return;
  }

  btn.disabled = true;
  btn.textContent = 'Creating account…';

  try {
    const r = await fetch('/api/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        name,
        email,
        password: pass,
        product: product || 'criminal',
      }),
    });
    const d = await r.json();

    if (!r.ok || d.error) {
      if (r.status === 409 || (d.error && d.error.toLowerCase().includes('already'))) {
        // Email already registered
        err.innerHTML = 'An account with this email already exists. <a onclick="prefillSignin(\'' + email.replace(/'/g, "\\'") + '\')">Sign in instead →</a>';
      } else {
        err.textContent = d.error || 'Registration failed. Please try again.';
      }
      err.classList.add('show');
    } else if (!d.token) {
      err.textContent = 'Account created but sign-in failed. Please use the Sign In tab.';
      err.classList.add('show');
    } else {
      // SUCCESS — same path as login
      await onAuthSuccess(d.token, d.user, true);
    }
  } catch(e) {
    err.textContent = 'Connection error. Please try again.';
    err.classList.add('show');
  }

  btn.disabled = false;
  btn.textContent = cfg.regBtn;
}

// Pre-fill sign in tab when email already exists
function prefillSignin(email) {
  showTab('signin');
  document.getElementById('siEmail').value = email;
  document.getElementById('siPass').focus();
}

// ─────────────────────────────────────────
// STEP NAVIGATION
// ─────────────────────────────────────────
function showStep(n) {
  if (n === 3) {
    document.querySelector('main').style.display = 'none';
    document.getElementById('planStep').style.display = 'block';
    window.scrollTo(0, 0);
  } else {
    document.querySelector('main').style.display = '';
    document.getElementById('planStep').style.display = 'none';
  }
}

// ─────────────────────────────────────────
// PLAN DATA & GRID
// ─────────────────────────────────────────
let isAnnual = false;
let selectedProduct = product || 'criminal';

const PLAN_DATA = {
  family: [
    { key:'free', name:'Free', monthly:0, annual:0, annualLabel:'', features:['1 document analysis','10 AI chat messages','All family law forms','PDF export'], btnClass:'plan-btn-free', btnText:'Start Free →', isFree:true },
    { key:'family_essential', name:'Essential', monthly:29, annual:249, annualLabel:'$249/yr — save $99', features:['3 analyses/month','50 chats/day','All family law forms','Full document analysis','PDF export'], btnClass:'plan-btn-paid', btnText:'Continue to Payment →' },
    { key:'family_complete',  name:'Complete',  monthly:79, annual:699, annualLabel:'$699/yr — save $249', features:['5 analyses/month','100 chats/day','All forms','Affidavit builder','PDF export'], btnClass:'plan-btn-paid', btnText:'Continue to Payment →', popular:true },
    { key:'family_counsel',   name:'Counsel',   monthly:159,annual:1399,annualLabel:'$1,399/yr — save $509',features:['Unlimited analyses','Unlimited chat','All premium features','Dictation','PDF export'], btnClass:'plan-btn-counsel', btnText:'Continue to Payment →' },
  ],
  criminal: [
    { key:'free', name:'Free', monthly:0, annual:0, annualLabel:'', features:['1 Crown disclosure analysis','10 AI chat messages','All charge modules','PDF export'], btnClass:'plan-btn-free', btnText:'Start Free →', isFree:true },
    { key:'criminal_essential', name:'Essential', monthly:29, annual:249, annualLabel:'$249/yr — save $99', features:['3 analyses/month','50 chats/day','All charge modules','Full 5-pass reports','PDF export'], btnClass:'plan-btn-paid', btnText:'Continue to Payment →' },
    { key:'criminal_complete',  name:'Complete',  monthly:79, annual:699, annualLabel:'$699/yr — save $249', features:['5 analyses/month','100 chats/day','Full 5-pass reports','Cross-exam builder','PDF export'], btnClass:'plan-btn-paid', btnText:'Continue to Payment →', popular:true },
    { key:'criminal_counsel',   name:'Counsel',   monthly:159,annual:1399,annualLabel:'$1,399/yr — save $509',features:['Unlimited analyses','Unlimited chat','All premium features','Dictation','PDF export'], btnClass:'plan-btn-counsel', btnText:'Continue to Payment →' },
  ],
  both: [
    { key:'bundle_essential', name:'Essential Bundle', monthly:49, annual:429, annualLabel:'$429/yr — save $159', features:['Both products','3 analyses/month per product','50 chats/day per product','PDF export'], btnClass:'plan-btn-paid', btnText:'Continue to Payment →' },
    { key:'bundle_complete',  name:'Complete Bundle',  monthly:129,annual:1099,annualLabel:'$1,099/yr — save $449',features:['Both products','5 analyses/month per product','100 chats/day per product','All premium features'], btnClass:'plan-btn-paid', btnText:'Continue to Payment →', popular:true },
    { key:'bundle_counsel',   name:'Counsel Bundle',   monthly:249,annual:2099,annualLabel:'$2,099/yr — save $799',features:['Both products','Unlimited everything','All premium on both','Dictation on both'], btnClass:'plan-btn-counsel', btnText:'Continue to Payment →' },
  ],
};
const APP_URLS = { family:'/family', criminal:'/criminal-app', both:'/criminal-app', '':'/criminal-app' };

function routeToApp(user) {
  const p = user?.products || selectedProduct || 'criminal';
  window.location.href = p === 'family' ? '/family' : '/criminal-app';
}

function setAnnual(annual) {
  isAnnual = annual;
  document.getElementById('lblMonthly').style.color = annual ? 'var(--text3)' : 'var(--blue-light)';
  document.getElementById('lblAnnual').style.color  = annual ? 'var(--blue-light)' : 'var(--text3)';
  document.getElementById('saveBadge').style.display = annual ? 'inline' : 'none';
  const knob = document.getElementById('toggleKnob');
  const slider = document.getElementById('toggleSlider');
  knob.style.transform = annual ? 'translateX(20px)' : '';
  slider.style.background = annual ? 'var(--blue)' : 'var(--border)';
  buildPlanGrid();
}

function buildPlanGrid() {
  const plans = PLAN_DATA[selectedProduct] || PLAN_DATA.criminal;
  const grid = document.getElementById('planGrid');
  grid.style.gridTemplateColumns = `repeat(${plans.length}, 1fr)`;
  grid.innerHTML = plans.map(p => `
    <div style="background:var(--navy-mid);border:${p.popular ? '2px solid var(--blue)' : '1px solid var(--border)'};padding:24px 20px;position:relative;border-radius:2px">
      ${p.popular ? '<div style="position:absolute;top:-11px;left:50%;transform:translateX(-50%);background:var(--blue);color:#fff;font-family:\'JetBrains Mono\',monospace;font-size:.46rem;text-transform:uppercase;letter-spacing:.1em;padding:3px 12px;white-space:nowrap">Most Popular</div>' : ''}
      <div style="font-family:\'JetBrains Mono\',monospace;font-size:.58rem;text-transform:uppercase;letter-spacing:.14em;color:var(--blue-light);margin-bottom:10px">${p.name}</div>
      <div style="font-family:\'Playfair Display\',serif;font-size:2rem;color:var(--white);line-height:1;margin-bottom:4px">${p.monthly === 0 ? 'Free' : '$' + (isAnnual ? Math.round(p.annual/12) : p.monthly)}<span style="font-family:\'Inter\',sans-serif;font-size:.8rem;color:var(--text3);font-weight:400">${p.monthly === 0 ? '' : '/mo'}</span></div>
      <div style="font-family:\'Inter\',sans-serif;font-size:.75rem;color:var(--text3);margin-bottom:16px;min-height:18px">${isAnnual && p.annualLabel ? p.annualLabel : (p.monthly > 0 ? 'billed monthly' : 'forever free')}</div>
      <ul style="list-style:none;margin-bottom:20px">${p.features.map(f => `<li style="font-family:\'Inter\',sans-serif;font-size:.78rem;color:var(--text2);padding:4px 0;border-bottom:1px solid rgba(255,255,255,.04);display:flex;align-items:flex-start;gap:7px"><span style="color:var(--blue-light);flex-shrink:0">✓</span>${f}</li>`).join('')}</ul>
      <button onclick="choosePlan('${p.key}',${!!p.isFree})" style="width:100%;padding:12px;border:none;cursor:pointer;font-family:\'JetBrains Mono\',monospace;font-size:.6rem;text-transform:uppercase;letter-spacing:.12em;font-weight:600;transition:all .15s;background:${p.btnClass==='plan-btn-free'?'none':'var(--blue)'};border:${p.btnClass==='plan-btn-free'?'1px solid var(--border)':'none'};color:${p.btnClass==='plan-btn-free'?'var(--text3)':'#fff'}">${p.btnText}</button>
    </div>
  `).join('');
}

async function choosePlan(planKey, isFree) {
  if (isFree) {
    window.location.href = APP_URLS[selectedProduct] || '/criminal-app';
    return;
  }
  const key = planKey + (isAnnual ? '_annual' : '');
  const tok = localStorage.getItem('ls_tok');
  try {
    const r = await fetch('/api/billing/checkout', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + tok },
      body: JSON.stringify({ planKey: key }),
    });
    const d = await r.json();
    if (d.url) {
      window.location.href = d.url;
    } else {
      alert("Unable to start checkout: " + (d.error || "Please try again or contact support@clearstand.ca"));
    }
  } catch(e) {
    window.location.href = APP_URLS[selectedProduct] || '/criminal-app';
  }
}

// Handle ?step=plans for returning users upgrading from account panel
if (params.get('step') === 'plans' && localStorage.getItem('ls_tok')) {
  selectedProduct = product || 'criminal';
  buildPlanGrid();
  showStep(3);
}

// ─────────────────────────────────────────
// ALREADY LOGGED IN — go straight to app
// Only on initial page load, not during flow
// ─────────────────────────────────────────
(function checkExistingSession() {
  const tok = localStorage.getItem('ls_tok');
  if (!tok) return;

  // Don't auto-redirect if they explicitly came to register
  // (presence of ?product means they want to start fresh or switch product)
  // Only auto-redirect on bare /register or /login with no params
  if (product) return;

  fetch('/api/auth/me', { headers: { 'Authorization': 'Bearer ' + tok } })
    .then(r => r.ok ? r.json() : null)
    .then(d => {
      if (d && d.user) {
        const p = d.user.products || 'criminal';
        window.location.href = p === 'family' ? '/family' : '/criminal-app';
      }
    })
    .catch(() => {});
})();
</script>
