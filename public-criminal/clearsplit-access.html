<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0D1B2A">
<title>ClearSplit — Enter Access Code</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  background: #0D1B2A;
  color: #E8EDF2;
  font-family: 'Inter', sans-serif;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

/* NAV */
.nav {
  padding: 20px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid rgba(255,255,255,.06);
  flex-shrink: 0;
}
.nav-logo {
  font-family: 'Playfair Display', serif;
  font-size: 1.15rem;
  font-weight: 700;
  color: #fff;
  text-decoration: none;
  letter-spacing: -.01em;
}
.nav-logo span { color: #20B2AA; }
.nav-link {
  font-family: 'JetBrains Mono', monospace;
  font-size: .52rem;
  text-transform: uppercase;
  letter-spacing: .12em;
  color: rgba(244,246,248,.35);
  text-decoration: none;
  transition: color .15s;
}
.nav-link:hover { color: rgba(244,246,248,.6); }

/* MAIN */
.main {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 48px 24px;
}
.card {
  width: 100%;
  max-width: 480px;
  text-align: center;
}
.eyebrow {
  font-family: 'JetBrains Mono', monospace;
  font-size: .6rem;
  text-transform: uppercase;
  letter-spacing: .18em;
  color: #20B2AA;
  margin-bottom: 20px;
  display: block;
}
.heading {
  font-family: 'Playfair Display', serif;
  font-size: clamp(1.6rem, 4vw, 2.2rem);
  color: #fff;
  line-height: 1.2;
  margin-bottom: 12px;
}
.subtext {
  font-family: 'Inter', sans-serif;
  font-size: .92rem;
  color: rgba(244,246,248,.5);
  line-height: 1.65;
  margin-bottom: 40px;
}

/* CODE INPUT */
.input-wrap { position: relative; margin-bottom: 14px; }
.code-input {
  width: 100%;
  background: rgba(255,255,255,.05);
  border: 2px solid rgba(255,255,255,.12);
  color: #fff;
  padding: 18px 20px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 2rem;
  font-weight: 500;
  text-align: center;
  letter-spacing: .3em;
  outline: none;
  transition: border-color .2s;
  text-transform: uppercase;
  -webkit-appearance: none;
}
.code-input::placeholder {
  color: rgba(255,255,255,.15);
  letter-spacing: .2em;
  font-size: 1.4rem;
}
.code-input:focus { border-color: #20B2AA; }
.code-input.error { border-color: #E74C3C; }

.error-msg {
  font-family: 'Inter', sans-serif;
  font-size: .85rem;
  color: #E87070;
  margin-bottom: 14px;
  display: none;
  padding: 10px 14px;
  background: rgba(200,60,60,.1);
  border: 1px solid rgba(200,60,60,.3);
  text-align: left;
}
.error-msg.show { display: block; }
.error-msg a { color: #E87070; font-weight: 600; }

.expired-msg {
  font-family: 'Inter', sans-serif;
  font-size: .85rem;
  color: rgba(244,246,248,.6);
  margin-bottom: 14px;
  padding: 14px;
  background: rgba(255,255,255,.04);
  border: 1px solid rgba(255,255,255,.1);
  text-align: left;
  display: none;
}
.expired-msg.show { display: block; }

.btn {
  width: 100%;
  padding: 16px;
  background: #20B2AA;
  color: #0d2d2a;
  border: none;
  cursor: pointer;
  font-family: 'JetBrains Mono', monospace;
  font-size: .72rem;
  text-transform: uppercase;
  letter-spacing: .14em;
  font-weight: 700;
  transition: background .15s;
  margin-bottom: 10px;
}
.btn:hover { background: #2DD4CC; }
.btn:disabled { background: rgba(255,255,255,.1); color: rgba(255,255,255,.3); cursor: not-allowed; }

.btn-extend {
  width: 100%;
  padding: 14px;
  background: none;
  border: 1px solid #20B2AA;
  color: #20B2AA;
  cursor: pointer;
  font-family: 'JetBrains Mono', monospace;
  font-size: .65rem;
  text-transform: uppercase;
  letter-spacing: .12em;
  font-weight: 600;
  transition: all .15s;
  margin-bottom: 10px;
  text-decoration: none;
  display: none;
}
.btn-extend.show { display: block; }
.btn-extend:hover { background: rgba(32,178,170,.1); }

.hint {
  font-family: 'Inter', sans-serif;
  font-size: .8rem;
  color: rgba(244,246,248,.3);
  margin-top: 20px;
  line-height: 1.6;
}
.hint a {
  color: #20B2AA;
  text-decoration: none;
}
.hint a:hover { text-decoration: underline; }

/* LOADING */
.spinner {
  width: 20px; height: 20px;
  border: 2px solid rgba(255,255,255,.2);
  border-top-color: #0d2d2a;
  border-radius: 50%;
  animation: spin .7s linear infinite;
  display: inline-block;
  vertical-align: middle;
  margin-right: 8px;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<nav class="nav">
  <a href="/" class="nav-logo">Clear<span>Stand</span></a>
  <a href="/clearsplit" class="nav-link">← About ClearSplit</a>
</nav>

<main class="main">
  <div class="card">
    <span class="eyebrow">ClearSplit Access</span>
    <h1 class="heading">Enter your access code<br>to open your agreement.</h1>
    <p class="subtext">Your 6-character code was emailed to you after purchase. Both parties use the same code.</p>

    <div class="input-wrap">
      <input
        class="code-input"
        id="codeInput"
        type="text"
        maxlength="6"
        placeholder="· · · · · ·"
        autocomplete="off"
        autocapitalize="characters"
        spellcheck="false"
        oninput="onCodeInput(this)"
        onkeydown="if(event.key==='Enter')submitCode()"
      >
    </div>

    <div class="error-msg" id="errorMsg"></div>
    <div class="expired-msg" id="expiredMsg"></div>

    <button class="btn" id="submitBtn" onclick="submitCode()" disabled>Access My Agreement →</button>
    <a class="btn-extend" id="extendBtn" href="/clearsplit/extend">Extend My Access — $74 →</a>

    <p class="hint">
      Don't have a code? <a href="/clearsplit">Purchase ClearSplit for $299 →</a>
    </p>
  </div>
</main>

<script>
function onCodeInput(el) {
  // Force uppercase, strip non-alphanumeric
  el.value = el.value.toUpperCase().replace(/[^A-Z0-9]/g, '').slice(0, 6);
  document.getElementById('submitBtn').disabled = el.value.length !== 6;
  document.getElementById('errorMsg').classList.remove('show');
  document.getElementById('expiredMsg').classList.remove('show');
  document.getElementById('extendBtn').classList.remove('show');
  el.classList.remove('error');
}

async function submitCode() {
  const input = document.getElementById('codeInput');
  const code = input.value.trim().toUpperCase();
  if (code.length !== 6) return;

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Verifying…';

  const errorMsg = document.getElementById('errorMsg');
  const expiredMsg = document.getElementById('expiredMsg');
  const extendBtn = document.getElementById('extendBtn');
  errorMsg.classList.remove('show');
  expiredMsg.classList.remove('show');
  extendBtn.classList.remove('show');
  input.classList.remove('error');

  try {
    const res = await fetch('/api/billing/clearsplit/verify', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code }),
    });
    const data = await res.json();

    if (res.ok && data.valid) {
      // Store code in sessionStorage and redirect to app
      sessionStorage.setItem('cs_code', code);
      sessionStorage.setItem('cs_expires', data.expiresAt);
      window.location.href = `/clearsplit-app?code=${encodeURIComponent(code)}`;
    } else if (res.status === 410) {
      // Expired
      input.classList.add('error');
      if (data.error === 'expired_grace') {
        expiredMsg.textContent = 'This code can no longer be extended. Purchase a new ClearSplit agreement for $299.';
        expiredMsg.classList.add('show');
      } else {
        expiredMsg.innerHTML = 'Your 90-day access period has ended. Extend your access for $74.';
        expiredMsg.classList.add('show');
        extendBtn.href = `/clearsplit/extend?code=${encodeURIComponent(code)}`;
        extendBtn.classList.add('show');
      }
    } else {
      input.classList.add('error');
      errorMsg.innerHTML = 'Code not found. Check your email for the correct code or contact <a href="mailto:support@clearstand.ca">support@clearstand.ca</a>';
      errorMsg.classList.add('show');
    }
  } catch(e) {
    errorMsg.textContent = 'Connection error. Please try again.';
    errorMsg.classList.add('show');
  }

  btn.disabled = false;
  btn.textContent = 'Access My Agreement →';
}

// Pre-fill code from URL param if present
const urlCode = new URLSearchParams(window.location.search).get('code');
if (urlCode) {
  const input = document.getElementById('codeInput');
  input.value = urlCode.toUpperCase().slice(0, 6);
  onCodeInput(input);
}
</script>
</body>
</html>
