<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0D1B2A">
<title>ClearSplit — Create Your Account</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
:root {
  --navy:#0D1B2A; --navy-mid:#162233; --navy-light:#1E3045;
  --blue:#2E86C1; --blue-light:#3EA4E4;
  --white:#F4F6F8; --border:#2A3F56; --text:#E8EDF2; --text2:#8BA3BA; --text3:#4A6680;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{min-height:100%;}
body{background:var(--navy);color:var(--text);font-family:'Inter',sans-serif;display:flex;flex-direction:column;min-height:100vh;}
nav{background:var(--navy-mid);border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;}
.nav-logo{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;color:var(--white);text-decoration:none;}
.nav-logo span{color:var(--blue-light);}
.nav-back{font-family:'JetBrains Mono',monospace;font-size:.52rem;text-transform:uppercase;letter-spacing:.12em;color:var(--text3);text-decoration:none;transition:color .15s;}
.nav-back:hover{color:var(--text2);}
main{flex:1;display:flex;align-items:flex-start;justify-content:center;padding:48px 24px 60px;}
.box{background:var(--navy-mid);border:1px solid var(--border);border-top:3px solid var(--blue);width:100%;max-width:440px;padding:36px 32px;}
.box-title{font-family:'Playfair Display',serif;font-size:1.4rem;color:var(--white);margin-bottom:6px;}
.box-sub{font-family:'JetBrains Mono',monospace;font-size:.5rem;text-transform:uppercase;letter-spacing:.14em;color:var(--text3);margin-bottom:28px;}
.lbl{font-family:'JetBrains Mono',monospace;font-size:.52rem;text-transform:uppercase;letter-spacing:.12em;color:var(--text3);margin-bottom:4px;display:block;}
.inp{width:100%;background:var(--navy);border:1px solid var(--border);color:var(--text);padding:12px 14px;font-family:'Inter',sans-serif;font-size:1rem;outline:none;margin-bottom:14px;transition:border-color .15s;-webkit-appearance:none;}
.inp:focus{border-color:var(--blue);}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.btn{width:100%;padding:14px;background:var(--blue);color:var(--white);border:none;cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:.68rem;text-transform:uppercase;letter-spacing:.15em;font-weight:500;margin-top:4px;min-height:50px;transition:background .15s;}
.btn:hover{background:var(--blue-light);}
.btn:disabled{opacity:.6;cursor:not-allowed;}
.err{font-family:'Inter',sans-serif;font-size:.85rem;color:#E87070;margin-bottom:12px;padding:10px 12px;background:rgba(232,112,112,.08);border:1px solid rgba(232,112,112,.2);display:none;}
.err.show{display:block;}
.note{font-family:'JetBrains Mono',monospace;font-size:.48rem;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);text-align:center;margin-top:16px;line-height:1.8;}
.code-badge{background:rgba(46,134,193,.12);border:1px solid rgba(46,134,193,.3);padding:12px 16px;margin-bottom:24px;text-align:center;}
.code-badge-label{font-family:'JetBrains Mono',monospace;font-size:.5rem;text-transform:uppercase;letter-spacing:.14em;color:var(--text3);margin-bottom:6px;}
.code-badge-code{font-family:'JetBrains Mono',monospace;font-size:1.6rem;font-weight:700;color:var(--white);letter-spacing:.3em;}
.party1-badge{background:rgba(46,134,193,.08);border:1px solid rgba(46,134,193,.2);padding:10px 14px;margin-bottom:20px;font-family:'Inter',sans-serif;font-size:.82rem;color:var(--text2);line-height:1.5;}
@media(max-width:420px){.box{padding:28px 20px;}.row2{grid-template-columns:1fr;}}
</style>
</head>
<body>

<nav>
  <a href="/clearsplit" class="nav-logo">Clear<span>Stand</span></a>
  <a href="/clearsplit" class="nav-back">← Back</a>
</nav>

<main>
  <div class="box" id="regBox">
    <div class="box-title" id="boxTitle">Create your ClearSplit account</div>
    <div class="box-sub" id="boxSub">Separation Agreement</div>

    <!-- Context badge shown for Party 1 or Party 2 -->
    <div id="contextBadge" style="display:none"></div>

    <div class="err" id="regErr"></div>

    <div class="row2">
      <div>
        <label class="lbl">First Name</label>
        <input class="inp" type="text" id="firstName" placeholder="First" autocomplete="given-name">
      </div>
      <div>
        <label class="lbl">Last Name</label>
        <input class="inp" type="text" id="lastName" placeholder="Last" autocomplete="family-name">
      </div>
    </div>

    <label class="lbl">Email</label>
    <input class="inp" type="email" id="email" placeholder="you@email.com" autocomplete="email">

    <label class="lbl">Password</label>
    <input class="inp" type="password" id="password" placeholder="Min. 8 characters" autocomplete="new-password">

    <label class="lbl">Confirm Password</label>
    <input class="inp" type="password" id="confirmPassword" placeholder="Repeat password" autocomplete="new-password" onkeydown="if(event.key==='Enter')doRegister()">

    <button class="btn" id="regBtn" onclick="doRegister()">Create Account & Access Agreement →</button>

    <div class="note">ClearSplit account only. Does not include Family Law or Criminal Defence access.</div>
  </div>
</main>

<script>
const params     = new URLSearchParams(window.location.search);
const role       = params.get('role') || 'party2';      // 'party1' | 'party2'
const code       = params.get('code') || '';
const sessionId  = params.get('session_id') || '';
const party1Name = params.get('party1') || '';

// Set up UI based on role
if (role === 'party1') {
  document.getElementById('boxTitle').textContent = 'Create your ClearSplit account';
  document.getElementById('boxSub').textContent = 'Your purchase is confirmed — create your account to access your agreement.';
  const badge = document.getElementById('contextBadge');
  badge.innerHTML = '<div class="party1-badge">✓ Payment confirmed. Create your account to access your agreement and get your access code.</div>';
  badge.style.display = 'block';
} else if (role === 'party2' && (code || party1Name)) {
  const displayName = party1Name ? party1Name + "'s" : 'the';
  document.getElementById('boxTitle').textContent = `Join ${party1Name ? party1Name + "'s" : 'the'} separation agreement`;
  document.getElementById('boxSub').textContent = 'Create your account to access and contribute to the agreement.';
  if (code) {
    const badge = document.getElementById('contextBadge');
    badge.innerHTML = `<div class="code-badge"><div class="code-badge-label">Agreement Code</div><div class="code-badge-code">${code}</div></div>`;
    badge.style.display = 'block';
  }
}

// Pre-fill email if passed
const emailParam = params.get('email');
if (emailParam) document.getElementById('email').value = decodeURIComponent(emailParam);

async function doRegister() {
  const firstName      = document.getElementById('firstName').value.trim();
  const lastName       = document.getElementById('lastName').value.trim();
  const email          = document.getElementById('email').value.trim();
  const password       = document.getElementById('password').value;
  const confirmPassword= document.getElementById('confirmPassword').value;
  const err            = document.getElementById('regErr');
  const btn            = document.getElementById('regBtn');
  err.classList.remove('show');

  if (!firstName || !lastName) { err.textContent = 'Please enter your first and last name.'; err.classList.add('show'); return; }
  if (!email) { err.textContent = 'Email address required.'; err.classList.add('show'); return; }
  if (!password) { err.textContent = 'Password required.'; err.classList.add('show'); return; }
  if (password.length < 8) { err.textContent = 'Password must be at least 8 characters.'; err.classList.add('show'); return; }
  if (password !== confirmPassword) { err.textContent = 'Passwords do not match.'; err.classList.add('show'); return; }

  btn.disabled = true;
  btn.textContent = 'Creating account…';

  try {
    const body = { firstName, lastName, email, password, confirmPassword, role };
    if (role === 'party2') body.code = code;
    if (role === 'party1') body.stripeSessionId = sessionId;

    const r = await fetch('/api/clearsplit/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const d = await r.json();

    if (d.error) {
      const messages = {
        not_found: 'Access code not found. Check the code shared with you.',
        expired:   'This agreement has expired. Contact the other party about extending access.',
        full:      'This agreement already has two parties. Contact support@clearstand.ca if this is an error.',
        UNIQUE:    'An account with this email already exists. Try signing in instead.',
      };
      err.textContent = messages[d.error] || d.error;
      err.classList.add('show');
    } else {
      // Success — store token and redirect to app
      localStorage.setItem('cs_tok', d.token);
      window.location.href = '/clearsplit/app';
    }
  } catch(e) {
    err.textContent = 'Connection error. Please try again.';
    err.classList.add('show');
  }

  btn.disabled = false;
  btn.textContent = 'Create Account & Access Agreement →';
}
</script>
</body>
</html>
